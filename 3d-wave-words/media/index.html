<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Wave Words</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            perspective: 1500px;
            overflow: hidden;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(40, 20px);
            grid-template-rows: repeat(40, 20px);
            transform-style: preserve-3d;
            transform: rotateX(60deg) rotateZ(45deg) translateY(-100px) translateX(-100px);
        }

        .word {
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: monospace;
            font-size: 14px;
            background-color: rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body>

<div class="container"></div>

<script src="./script.js"></script>
</body>
</html>
