<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #box {
            width: 400px;
            height: 400px;
            position: relative;
        }

        #box .item {
            width: calc(100% / 4);
            height: calc(100% / 4);
            position: absolute;

            transition: .3s;
            border: 1px solid #fff;

            background-image: url("image.jpg");
        }

        #box .item[data-location="1"],
        #box .item[data-location="5"],
        #box .item[data-location="9"],
        #box .item[data-location="13"] {
            left: 0;
        }

        #box .item[data-location="2"],
        #box .item[data-location="6"],
        #box .item[data-location="10"],
        #box .item[data-location="14"] {
            left: calc(100% / 4 * 1);
        }

        #box .item[data-location="3"],
        #box .item[data-location="7"],
        #box .item[data-location="11"],
        #box .item[data-location="15"] {
            left: calc(100% / 4 * 2);
        }

        #box .item[data-location="4"],
        #box .item[data-location="8"],
        #box .item[data-location="12"],
        #box .item[data-location="16"] {
            left: calc(100% / 4 * 3);
        }

        #box .item[data-location="1"],
        #box .item[data-location="2"],
        #box .item[data-location="3"],
        #box .item[data-location="4"] {
            top: 0;
        }

        #box .item[data-location="5"],
        #box .item[data-location="6"],
        #box .item[data-location="7"],
        #box .item[data-location="8"] {
            top: calc(100% / 4 * 1);
        }

        #box .item[data-location="9"],
        #box .item[data-location="10"],
        #box .item[data-location="11"],
        #box .item[data-location="12"] {
            top: calc(100% / 4 * 2);
        }

        #box .item[data-location="13"],
        #box .item[data-location="14"],
        #box .item[data-location="15"],
        #box .item[data-location="16"] {
            top: calc(100% / 4 * 3);
        }

        #box .item[data-original="1"],
        #box .item[data-original="5"],
        #box .item[data-original="9"],
        #box .item[data-original="13"] {
            background-position-x: 0;
        }

        #box .item[data-original="2"],
        #box .item[data-original="6"],
        #box .item[data-original="10"],
        #box .item[data-original="14"] {
            background-position-x: calc(100% / 4 * 1);
        }

        #box .item[data-original="3"],
        #box .item[data-original="7"],
        #box .item[data-original="11"],
        #box .item[data-original="15"] {
            background-position-x: calc(100% / 4 * 2);
        }

        #box .item[data-original="4"],
        #box .item[data-original="8"],
        #box .item[data-original="12"],
        #box .item[data-original="16"] {
            background-position-x: calc(100% / 4 * 3);
        }

        #box .item[data-original="1"],
        #box .item[data-original="2"],
        #box .item[data-original="3"],
        #box .item[data-original="4"] {
            background-position-y: 0;
        }

        #box .item[data-original="5"],
        #box .item[data-original="6"],
        #box .item[data-original="7"],
        #box .item[data-original="8"] {
            background-position-y: calc(100% / 4 * 1);
        }

        #box .item[data-original="9"],
        #box .item[data-original="10"],
        #box .item[data-original="11"],
        #box .item[data-original="12"] {
            background-position-y: calc(100% / 4 * 2);
        }

        #box .item[data-original="13"],
        #box .item[data-original="14"],
        #box .item[data-original="15"],
        #box .item[data-original="16"] {
            background-position-y: calc(100% / 4 * 3);
        }
    </style>
    <script>

        window.onload = () => {
            const maxCount = 16;
            const $box = document.querySelector("#box");

            let html = "";
            for (let i = 1; i < maxCount; i++) {
                html += `
                <div class="item" data-original="${i}" data-location="${i}"></div>
                `
            }

            $box.innerHTML = html;

            $box.querySelectorAll(".item").forEach($item => $item.addEventListener("click", function(e){
                const location = +this.dataset.location;

                const top = location - 4;
                const bottom = location + 4;
                const left = location - 1;
                const right = location + 1;

                if(top > 0 && !$box.querySelector(`.item[data-location='${top}']`)) {
                    this.dataset.location = top;
                } else if(bottom <= maxCount && !$box.querySelector(`.item[data-location='${bottom}']`)) {
                    this.dataset.location = bottom;
                } else if(location % 4 !== 1 && !$box.querySelector(`.item[data-location='${left}']`)) {
                    this.dataset.location = left;
                } else if(location % 4 !== 0 && !$box.querySelector(`.item[data-location='${right}']`)) {
                    this.dataset.location = right;
                }

            }))
        }
    </script>
</head>
<body>

<div id="box">

</div>

</body>
</html>
