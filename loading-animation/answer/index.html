<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Loading animation</title>

    <link rel="stylesheet" href="./style.css">

</head>
<body>

<div id="wrapper">
    <div class="horBox">
        <div class="stick horizontal top">
            <div class="item a up"></div>
            <div class="item b down"></div>
        </div>
    </div>

    <div class="verBox">
        <div class="stick vertical left">
            <div class="item a down"></div>
            <div class="item b up"></div>
        </div>
        <div class="stick vertical right">
            <div class="item a up"></div>
            <div class="item b down"></div>
        </div>
    </div>

    <div class="horBox">
        <div class="stick horizontal bottom">
            <div class="item a down"></div>
            <div class="item b up"></div>
        </div>
    </div>
</div>

</body>
</html>
